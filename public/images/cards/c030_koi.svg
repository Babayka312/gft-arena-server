<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#334155" stop-opacity="1"/>
      <stop offset="1" stop-color="#050816" stop-opacity="1"/>
    </linearGradient>
    <radialGradient id="nebula" cx="50%" cy="42%" r="60%">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.45"/>
      <stop offset="0.45" stop-color="#334155" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="holo" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#94a3b8" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#94a3b8" stop-opacity="0.36"/>
      <stop offset="1" stop-color="#94a3b8" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="36" y="36" rx="28" ry="28" width="440" height="440" fill="url(#bg)" stroke="#94a3b8" stroke-width="6"/>
  <rect x="58" y="58" rx="22" ry="22" width="396" height="396" fill="rgba(0,0,0,0.25)" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  <rect x="58" y="58" rx="22" ry="22" width="396" height="396" fill="url(#nebula)"/>

  <!-- Cyberpunk horizon grid -->
  <g opacity="0.26" stroke="#38bdf8" stroke-width="1">
    <path d="M80 352 H432"/>
    <path d="M94 382 H418"/>
    <path d="M116 410 H396"/>
    <path d="M256 346 L102 438"/>
    <path d="M256 346 L410 438"/>
    <path d="M220 346 L188 438"/>
    <path d="M292 346 L324 438"/>
  </g>

  <!-- Circuit accents -->
  <g opacity="0.52" stroke="#94a3b8" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M82 154 H130 V128 H168"/>
    <path d="M430 154 H382 V128 H344"/>
    <path d="M92 320 H138 V346 H176"/>
    <path d="M420 320 H374 V346 H336"/>
  </g>
  <g fill="#38bdf8" opacity="0.8">
    <circle cx="168" cy="128" r="5"/>
    <circle cx="344" cy="128" r="5"/>
    <circle cx="176" cy="346" r="5"/>
    <circle cx="336" cy="346" r="5"/>
    <circle cx="112" cy="94" r="2"/>
    <circle cx="196" cy="86" r="2"/>
    <circle cx="376" cy="98" r="2"/>
    <circle cx="406" cy="246" r="2"/>
    <circle cx="110" cy="252" r="2"/>
  </g>

  <circle cx="116" cy="116" r="34" fill="rgba(0,0,0,0.35)" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>
  <text x="116" y="128" text-anchor="middle" font-size="34" font-family="system-ui,Segoe UI,Apple Color Emoji,Noto Color Emoji" fill="#fff">💧</text>

  <!-- Main creature, neon hologram style -->
  <ellipse cx="256" cy="326" rx="108" ry="26" fill="#38bdf8" opacity="0.18" filter="url(#softGlow)"/>
  <circle cx="256" cy="235" r="110" fill="#94a3b8" opacity="0.08" filter="url(#softGlow)"/>
  <text x="256" y="292" text-anchor="middle" font-size="156" font-family="system-ui,Segoe UI,Apple Color Emoji,Noto Color Emoji" fill="#fff" filter="url(#glow)">🐠</text>
  <path d="M96 228 C168 190 344 190 416 228" stroke="url(#holo)" stroke-width="5" fill="none" opacity="0.7"/>
  <path d="M96 258 C168 296 344 296 416 258" stroke="url(#holo)" stroke-width="4" fill="none" opacity="0.48"/>

  <text x="256" y="372" text-anchor="middle" font-size="28" font-weight="800" font-family="system-ui,Segoe UI" fill="#e2e8f0">Карп кои</text>
  <text x="256" y="400" text-anchor="middle" font-size="15" font-weight="800" font-family="system-ui,Segoe UI" fill="#94a3b8" letter-spacing="2">COMMON • WATER</text>

  <g font-family="system-ui,Segoe UI" font-size="20" font-weight="700" fill="#e2e8f0" opacity="0.95">
    <text x="78" y="438">HP 260</text>
    <text x="210" y="438">PWR 17</text>
    <text x="360" y="438">SPD 6</text>
  </g>
</svg>
