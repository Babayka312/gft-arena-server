# Пример: Nginx перед Node (gft-arena: express отдаёт dist + /api на 127.0.0.1:5055).
# 1) A-записи gftarenatest.cc и www → IP сервера.
# 2) certbot certonly --nginx -d gftarenatest.cc -d www.gftarenatest.cc
# 3) Подставь пути к сертификатам (или certbot --nginx -a для автогенерации в конфиге).
# 4) systemctl reload nginx
#
# upstream для ясности — можно и без него, сразу proxy_pass http://127.0.0.1:5055

upstream gft_arena_node {
  server 127.0.0.1:5055;
  keepalive 8;
}

server {
  listen 80;
  listen [::]:80;
  server_name gftarenatest.cc www.gftarenatest.cc;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name gftarenatest.cc www.gftarenatest.cc;

  ssl_certificate     /etc/letsencrypt/live/gftarenatest.cc/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/gftarenatest.cc/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

  client_max_body_size 6m;

  location / {
    proxy_pass         http://gft_arena_node;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   Upgrade $http_upgrade;
    proxy_set_header   Connection "upgrade";
  }
}
