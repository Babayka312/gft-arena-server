# Отдельный хост только для API (тот же Node на 127.0.0.1:5055, что и для gftarenatest.cc).
# DNS: A api.gftarenatest.cc → IP сервера.
# SSL: sudo certbot certonly --nginx -d api.gftarenatest.cc
# Затем подставь пути к fullchain/privkey или certbot --nginx сам допишет.

upstream gft_arena_api {
  server 127.0.0.1:5055;
  keepalive 8;
}

server {
  listen 80;
  listen [::]:80;
  server_name api.gftarenatest.cc;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name api.gftarenatest.cc;

  ssl_certificate     /etc/letsencrypt/live/api.gftarenatest.cc/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/api.gftarenatest.cc/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

  client_max_body_size 6m;

  location / {
    proxy_pass         http://gft_arena_api;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
  }
}
